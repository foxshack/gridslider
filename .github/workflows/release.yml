name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to release (for example: v1.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate tag format
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$TAG' must look like v1.2.3 (or prerelease like v1.2.3-rc.1)."
            exit 1
          fi

      - name: Ensure tag exists
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          git fetch --tags --force
          git rev-parse "$TAG" >/dev/null

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: make install

      - name: Validate package version matches tag
        run: make validate-version TAG=${{ steps.meta.outputs.tag }}

      - name: Build
        run: make build

      - name: Create GitHub release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/gridslider.mjs
            dist/gridslider.mjs.map
            dist/gridslider.js
            dist/gridslider.js.map
            dist/theme.css
            dist/theme.css.map
